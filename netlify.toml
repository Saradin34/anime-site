[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/anilibria-v3/*"
  to = "https://api.anilibria.tv/v3/:splat"
  status = 200
  force = true
  headers = {X-From = "Netlify"}

[[redirects]]
  from = "/api/aniliberty/*"
  to = "https://aniliberty.top/api/v1/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/jikan/*"
  to = "https://api.jikan.moe/v4/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
