<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08060f" />
    <meta name="description" content="AnimeFlux — современный сервис для просмотра аниме онлайн" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <title>AnimeFlux — смотрите аниме онлайн</title>
    <script>
      // Применяем тему ДО рендера React, чтобы избежать вспышки
      (function() {
        try {
          var stored = localStorage.getItem('animeflux:theme');
          var mode = 'dark';
          if (stored) {
            var parsed = JSON.parse(stored);
            mode = (parsed && parsed.state && parsed.state.mode) || 'dark';
          }
          var resolved = mode;
          if (mode === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          // Удаляем оба класса и ставим строго один
          document.documentElement.classList.remove('light', 'dark');
          document.documentElement.classList.add(resolved);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
